name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build
        run: nix develop --command dotnet build Manatee.sln -c Release

      # Oracle tests included: the devshell pins ngspice, and a missing
      # oracle is a hard failure, never a silent skip.
      - name: Test
        run: nix develop --command dotnet test Manatee.sln -c Release --no-build
        env:
          DiffEngine_Disabled: "true"

      - name: Benchmark smoke (dry job, no perf gating)
        run: nix develop --command dotnet run -c Release --project core/Manatee.Benchmarks -- --filter '*' -j Dry
